<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRTC Pro – Gerçek Zamanlı İletişim Platformu</title>
    <meta name="description" content="Profesyonel WebRTC tabanlı gerçek zamanlı video, ses ve mesajlaşma platformu." />
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0a0f1e;
            --surface-color: #111827;
            --surface-hover: #1a2332;
            --border-color: #1f2937;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --success-color: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --warning-color: #f59e0b;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --glass-bg: rgba(17, 24, 39, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --surface-color: #ffffff;
            --surface-hover: #f8fafc;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        /* === RECONNECT BANNER === */
        .reconnect-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, var(--warning-color), #f97316);
            color: #000;
            text-align: center;
            padding: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 9999;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .reconnect-banner.visible { transform: translateY(0); }
        .reconnect-banner .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes breathe { 0%, 100% { box-shadow: 0 0 0 0 var(--primary-glow); } 50% { box-shadow: 0 0 20px 4px var(--primary-glow); } }

        /* === HEADER === */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo-container .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .logo-container .logo-text { background: linear-gradient(135deg, var(--primary-color), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-controls { display: flex; align-items: center; gap: 12px; }

        .connection-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface-color);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            transition: border-color var(--transition);
        }
        .connection-panel:focus-within { border-color: var(--primary-color); }

        .input-group { display: flex; align-items: center; gap: 6px; }
        .input-group i { color: var(--text-muted); width: 16px; height: 16px; }

        input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            width: 110px;
        }
        input::placeholder { color: var(--text-muted); }

        .divider { width: 1px; height: 20px; background: var(--border-color); }

        /* === BUTTONS === */
        button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        button:active:not(:disabled) { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 15px var(--primary-glow); }

        .btn-danger { background: var(--danger-color); color: white; }
        .btn-danger:hover:not(:disabled) { background: var(--danger-hover); transform: translateY(-1px); }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 50%;
            width: 36px; height: 36px;
            display: flex;  align-items: center; justify-content: center;
        }
        .btn-ghost:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--text-muted); }

        /* === STATUS BADGE === */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .status-badge::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-badge.disconnected { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        .status-badge.disconnected::before { background: var(--danger-color); }
        .status-badge.connected { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .status-badge.connected::before { background: var(--success-color); box-shadow: 0 0 8px var(--success-glow); animation: pulse 2s ease infinite; }

        /* === WORKSPACE === */
        .workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1700px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 61px);
            overflow: hidden;
        }

        /* === VIDEO GRID === */
        .video-grid { flex: 1; display: flex; flex-direction: column; gap: 16px; min-width: 0; }

        .main-video-container {
            flex: 1;
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, .remote-img { width: 100%; height: 100%; object-fit: contain; }

        /* === EMPTY VIDEO STATE === */
        .empty-video-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-muted);
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .empty-video-state .empty-icon {
            width: 80px; height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: breathe 3s ease-in-out infinite;
        }
        .empty-video-state .empty-icon i { color: var(--primary-color); }
        .empty-video-state p { font-size: 0.95rem; font-weight: 500; }
        .empty-video-state small { font-size: 0.8rem; opacity: 0.6; }

        .participant-name {
            position: absolute;
            bottom: 16px; left: 16px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* === LOCAL VIDEO PIP === */
        .local-video-container {
            position: absolute;
            top: 16px; right: 16px;
            width: 220px;
            aspect-ratio: 16/9;
            background: var(--surface-color);
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: grab;
        }
        .local-video-container:hover { transform: scale(1.02); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .local-video-container video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* === FLOATING CONTROLS === */
        .floating-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            z-index: 20;
        }

        .control-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all var(--transition);
            position: relative;
        }
        [data-theme="light"] .control-btn { background: rgba(0, 0, 0, 0.05); }

        .control-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        [data-theme="light"] .control-btn:hover:not(:disabled) { background: rgba(0, 0, 0, 0.1); }

        .control-btn.active-danger { background: var(--danger-color); color: white; }
        .control-btn.active-primary { background: var(--primary-color); color: white; }
        .control-btn.active-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 4px 15px var(--primary-glow); }

        /* Tooltip */
        .control-btn[title]::after {
            content: attr(title);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--surface-color);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            border: 1px solid var(--border-color);
        }
        .control-btn[title]:hover::after { opacity: 1; transform: translateX(-50%) scale(1); }

        /* === SIDEBAR === */
        .sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            flex-shrink: 0;
        }

        .panel {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color var(--transition);
        }

        .participants-panel { flex: 0 0 auto; max-height: 200px; }
        .chat-panel { flex: 2; min-height: 0; }
        .log-panel { flex: 1; min-height: 0; }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .panel-header .badge {
            background: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
            font-weight: 700;
        }

        .panel-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .panel-content::-webkit-scrollbar { width: 4px; }
        .panel-content::-webkit-scrollbar-track { background: transparent; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* === PARTICIPANTS === */
        .participant-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            transition: background var(--transition);
            animation: slideIn 0.3s ease;
        }
        .participant-item:hover { background: var(--surface-hover); }
        .participant-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.75rem; font-weight: 700;
            flex-shrink: 0;
        }
        .participant-info { flex: 1; min-width: 0; }
        .participant-info .name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .participant-info .type { font-size: 0.72rem; color: var(--text-muted); }
        .participant-status {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            box-shadow: 0 0 6px var(--success-glow);
            flex-shrink: 0;
        }
        .no-participants {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px;
            color: var(--text-muted);
            font-size: 0.82rem;
            text-align: center;
        }

        /* === CHAT === */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.25s ease;
        }
        .message.system { align-self: center; align-items: center; max-width: 100%; }
        .message.system .msg-bubble { background: transparent; color: var(--text-muted); font-size: 0.8rem; padding: 2px 0; }
        .message.self { align-self: flex-end; }
        .message.other { align-self: flex-start; }

        .msg-meta { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 3px; display: flex; gap: 6px; }
        .message.self .msg-meta { justify-content: flex-end; }

        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
        .message.other .msg-bubble { background: var(--border-color); border-top-left-radius: 4px; }
        .message.self .msg-bubble { background: linear-gradient(135deg, var(--primary-color), #7c3aed); color: white; border-top-right-radius: 4px; }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .chat-input:focus { border-color: var(--primary-color); }
        .send-btn { width: 38px; height: 38px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; }

        /* === LOG === */
        .log-item {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.5;
            animation: fadeInUp 0.2s ease;
        }
        .log-item.error { color: var(--danger-color); }

        /* === FOOTER === */
        footer {
            padding: 10px 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            background: var(--glass-bg);
            flex-shrink: 0;
        }
        footer a { color: var(--primary-color); text-decoration: none; }

        /* === RESPONSIVE === */
        @media (max-width: 1100px) {
            .workspace { flex-direction: column; height: auto; overflow: visible; }
            .sidebar { width: 100%; height: auto; max-height: 500px; }
            .main-video-container { min-height: 350px; }
            .participants-panel { max-height: 120px; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 12px; padding: 10px 16px; }
            .connection-panel { flex-direction: column; width: 100%; border-radius: var(--radius-md); padding: 10px; }
            .divider { width: 100%; height: 1px; }
            input { width: 100%; }
            .workspace { padding: 12px; gap: 12px; }
            .local-video-container { width: 110px; top: 10px; right: 10px; }
            .floating-controls { width: 92%; justify-content: space-around; padding: 8px 12px; gap: 6px; }
            .control-btn { width: 42px; height: 42px; }
            .control-btn[title]::after { display: none; }
            .sidebar { gap: 10px; }
            footer { padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <!-- Reconnect Banner -->
    <div class="reconnect-banner" id="reconnectBanner" role="alert" aria-live="polite">
        <div class="spinner"></div>
        Bağlantı kesildi, yeniden bağlanılıyor...
    </div>

    <header>
        <div class="logo-container">
            <div class="logo-icon" aria-hidden="true">
                <i data-lucide="video" style="width:20px;height:20px;"></i>
            </div>
            <span class="logo-text">WebRTC Pro</span>
        </div>

        <div class="connection-panel" role="form" aria-label="Bağlantı Ayarları">
            <div class="input-group">
                <i data-lucide="hash"></i>
                <input type="text" id="roomId" value="room1" placeholder="Oda ID" aria-label="Oda ID" />
            </div>
            <div class="divider"></div>
            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="userName" value="WebUser" placeholder="Kullanıcı Adı" aria-label="Kullanıcı Adı" />
            </div>
            <button id="connectBtn" class="btn-primary" aria-label="Odaya Bağlan">
                <i data-lucide="log-in" style="width:16px;height:16px;"></i> Bağlan
            </button>
            <button id="disconnectBtn" class="btn-danger" style="display: none;" aria-label="Odadan Ayrıl">
                <i data-lucide="log-out" style="width:16px;height:16px;"></i> Ayrıl
            </button>
            <div class="divider"></div>
            <div class="status-badge disconnected" id="status" role="status">Bağlı Değil</div>
        </div>

        <div class="header-controls">
            <button class="btn-ghost" id="themeToggle" title="Temayı Değiştir" aria-label="Temayı Değiştir">
                <i data-lucide="moon" id="themeIcon" style="width:18px;height:18px;"></i>
            </button>
        </div>
    </header>

    <div class="workspace">
        <div class="video-grid">
            <div class="main-video-container">
                <div class="video-wrapper">
                    <!-- Empty State -->
                    <div class="empty-video-state" id="emptyVideoState">
                        <div class="empty-icon">
                            <i data-lucide="video" style="width:36px;height:36px;"></i>
                        </div>
                        <p>Henüz aktif görüşme yok</p>
                        <small>Odaya bağlanarak görüşme başlatın</small>
                    </div>

                    <!-- Remote Video -->
                    <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
                    <!-- For Windows Client Base64 Fallback -->
                    <img id="remoteImage" class="remote-img" style="display: none;" alt="Uzak Görüntü" />

                    <div class="participant-name" id="remoteParticipantName" style="display: none;">
                        <i data-lucide="user" style="width:14px;height:14px;"></i>
                        <span id="remoteNameText">Uzak Kullanıcı</span>
                    </div>
                </div>

                <!-- Local Video PIP -->
                <div class="local-video-container" id="localVideoContainer" style="display: none;">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="participant-name" style="bottom: 6px; left: 6px; font-size: 0.72rem; padding: 3px 8px;">Sen</div>
                </div>

                <!-- Meeting Controls -->
                <div class="floating-controls" role="toolbar" aria-label="Görüşme Kontrolleri">
                    <button class="control-btn" id="toggleAudioBtn" title="Mikrofon" disabled aria-label="Mikrofon Aç/Kapat">
                        <i data-lucide="mic" style="width:20px;height:20px;"></i>
                    </button>
                    <button class="control-btn" id="toggleVideoBtn" title="Kamera" disabled aria-label="Kamera Aç/Kapat">
                        <i data-lucide="camera" style="width:20px;height:20px;"></i>
                    </button>
                    <button class="control-btn" id="shareScreenBtn" title="Ekran Paylaş" disabled aria-label="Ekran Paylaş">
                        <i data-lucide="monitor-up" style="width:20px;height:20px;"></i>
                    </button>
                    <button class="control-btn active-danger" id="endCallBtn" title="Görüşmeyi Bitir" style="display: none;" aria-label="Görüşmeyi Bitir">
                        <i data-lucide="phone-off" style="width:20px;height:20px;"></i>
                    </button>
                    <button class="control-btn active-primary" id="startCallBtn" title="Görüşme Başlat" disabled aria-label="Görüşme Başlat">
                        <i data-lucide="phone" style="width:20px;height:20px;"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <!-- Participants Panel -->
            <div class="panel participants-panel">
                <div class="panel-header">
                    <i data-lucide="users" style="width:16px;height:16px;"></i> Katılımcılar
                    <span class="badge" id="participantCount">0</span>
                </div>
                <div class="panel-content" id="participantList">
                    <div class="no-participants" id="noParticipants">
                        <i data-lucide="user-x" style="width:20px;height:20px;color:var(--text-muted)"></i>
                        Henüz kimse yok
                    </div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="panel chat-panel">
                <div class="panel-header">
                    <i data-lucide="message-square" style="width:16px;height:16px;"></i> Sohbet
                </div>
                <div class="panel-content" id="chatMessages" role="log" aria-label="Sohbet Mesajları">
                    <div class="message system">
                        <div class="msg-bubble">Odaya katılarak sohbete başlayın.</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="messageInput" placeholder="Mesaj yazın..." disabled aria-label="Mesaj Girin" />
                    <button class="btn-primary send-btn" id="sendMessageBtn" disabled aria-label="Mesaj Gönder">
                        <i data-lucide="send" style="width:16px;height:16px;"></i>
                    </button>
                </div>
            </div>

            <!-- Log Panel -->
            <div class="panel log-panel">
                <div class="panel-header">
                    <i data-lucide="terminal" style="width:16px;height:16px;"></i> Sistem Kayıtları
                </div>
                <div class="panel-content" id="systemLogs" role="log" aria-label="Sistem Kayıtları"></div>
            </div>
        </div>
    </div>

    <footer>
        WebRTC Pro v2.0 &mdash; Gerçek Zamanlı İletişim Platformu &copy; 2026
    </footer>

    <!-- SignalR Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // ─── Theme Toggle ─────────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('webrtc-theme');
        if (savedTheme) {
            html.setAttribute('data-theme', savedTheme);
            themeIcon.setAttribute('data-lucide', savedTheme === 'dark' ? 'moon' : 'sun');
            lucide.createIcons();
        }
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            themeIcon.setAttribute('data-lucide', next === 'dark' ? 'moon' : 'sun');
            localStorage.setItem('webrtc-theme', next);
            lucide.createIcons();
        });

        // ─── State Variables ──────────────────────────────────────
        let connection = null;
        let localStream = null;
        let remoteStream = null;
        let peerConnection = null;
        let currentRoomId = '';
        let currentUserName = '';
        let connectedUsers = new Map();
        let isAudioMuted = false;
        let isVideoMuted = false;
        let isScreenSharing = false;

        const rtcConfiguration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // ─── DOM Elements ─────────────────────────────────────────
        const el = {
            roomId: document.getElementById('roomId'),
            userName: document.getElementById('userName'),
            connectBtn: document.getElementById('connectBtn'),
            disconnectBtn: document.getElementById('disconnectBtn'),
            status: document.getElementById('status'),
            reconnectBanner: document.getElementById('reconnectBanner'),

            localVideo: document.getElementById('localVideo'),
            localVideoContainer: document.getElementById('localVideoContainer'),
            remoteVideo: document.getElementById('remoteVideo'),
            remoteImage: document.getElementById('remoteImage'),
            remoteParticipantName: document.getElementById('remoteParticipantName'),
            remoteNameText: document.getElementById('remoteNameText'),
            emptyVideoState: document.getElementById('emptyVideoState'),

            toggleAudioBtn: document.getElementById('toggleAudioBtn'),
            toggleVideoBtn: document.getElementById('toggleVideoBtn'),
            shareScreenBtn: document.getElementById('shareScreenBtn'),
            startCallBtn: document.getElementById('startCallBtn'),
            endCallBtn: document.getElementById('endCallBtn'),

            chatMessages: document.getElementById('chatMessages'),
            messageInput: document.getElementById('messageInput'),
            sendMessageBtn: document.getElementById('sendMessageBtn'),
            systemLogs: document.getElementById('systemLogs'),

            participantList: document.getElementById('participantList'),
            participantCount: document.getElementById('participantCount'),
            noParticipants: document.getElementById('noParticipants'),
        };

        // ─── Event Listeners ──────────────────────────────────────
        el.connectBtn.addEventListener('click', connectToServer);
        el.disconnectBtn.addEventListener('click', disconnectFromServer);
        el.startCallBtn.addEventListener('click', startCall);
        el.endCallBtn.addEventListener('click', endCall);
        el.sendMessageBtn.addEventListener('click', sendMessage);
        el.messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
        el.toggleAudioBtn.addEventListener('click', toggleAudio);
        el.toggleVideoBtn.addEventListener('click', toggleVideo);
        el.shareScreenBtn.addEventListener('click', toggleScreenShare);

        // ─── Notification Sound ───────────────────────────────────
        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.1;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                oscillator.stop(ctx.currentTime + 0.3);
            } catch { }
        }

        // ─── Participant List Management ──────────────────────────
        function updateParticipantList() {
            el.participantCount.textContent = connectedUsers.size;
            if (connectedUsers.size === 0) {
                el.participantList.innerHTML = '';
                const noP = document.createElement('div');
                noP.className = 'no-participants';
                noP.innerHTML = '<i data-lucide="user-x" style="width:20px;height:20px;color:var(--text-muted)"></i>Henüz kimse yok';
                el.participantList.appendChild(noP);
                lucide.createIcons();
                return;
            }

            el.participantList.innerHTML = '';
            // Add self first
            if (currentUserName) {
                const selfDiv = document.createElement('div');
                selfDiv.className = 'participant-item';
                const initials = currentUserName.substring(0, 2).toUpperCase();
                selfDiv.innerHTML = `
                    <div class="participant-avatar">${initials}</div>
                    <div class="participant-info">
                        <div class="name">${escapeHtml(currentUserName)} (Sen)</div>
                        <div class="type">WebClient</div>
                    </div>
                    <div class="participant-status"></div>`;
                el.participantList.appendChild(selfDiv);
            }

            connectedUsers.forEach((info, connId) => {
                const div = document.createElement('div');
                div.className = 'participant-item';
                div.id = `participant-${connId}`;
                const initials = info.userName.substring(0, 2).toUpperCase();
                div.innerHTML = `
                    <div class="participant-avatar">${initials}</div>
                    <div class="participant-info">
                        <div class="name">${escapeHtml(info.userName)}</div>
                        <div class="type">${escapeHtml(info.userType)}</div>
                    </div>
                    <div class="participant-status"></div>`;
                el.participantList.appendChild(div);
            });
            lucide.createIcons();
        }

        // ─── XSS Protection ──────────────────────────────────────
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─── Connect / Disconnect ─────────────────────────────────
        async function connectToServer() {
            if (!el.roomId.value.trim() || !el.userName.value.trim()) {
                alert('Lütfen Oda ID ve Kullanıcı Adı alanlarını doldurun!');
                return;
            }
            try {
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("http://localhost:5050/webrtchub")
                    .withAutomaticReconnect([0, 2000, 5000, 10000, 30000])
                    .configureLogging(signalR.LogLevel.Warning)
                    .build();

                setupSignalRHandlers();
                setupReconnectionHandlers();
                await connection.start();

                currentRoomId = el.roomId.value.trim();
                currentUserName = el.userName.value.trim();
                await connection.invoke("JoinRoom", currentRoomId, currentUserName, "WebClient");

                updateUIForConnected();
                logSystem(`Bağlantı başarılı. Oda: ${currentRoomId}`);
                await startLocalMedia();
            } catch (error) {
                logSystem(`Bağlantı hatası: ${error.message}`, true);
                alert(`Bağlantı başarısız: ${error.message}`);
            }
        }

        function setupReconnectionHandlers() {
            connection.onreconnecting(() => {
                el.reconnectBanner.classList.add('visible');
                el.status.textContent = 'Yeniden Bağlanıyor';
                el.status.className = 'status-badge disconnected';
                logSystem('Bağlantı kesildi, yeniden bağlanılıyor...', true);
            });
            connection.onreconnected(() => {
                el.reconnectBanner.classList.remove('visible');
                el.status.textContent = 'Bağlı';
                el.status.className = 'status-badge connected';
                logSystem('Yeniden bağlantı başarılı!');
                // Re-join room
                connection.invoke("JoinRoom", currentRoomId, currentUserName, "WebClient");
            });
            connection.onclose(() => {
                el.reconnectBanner.classList.remove('visible');
                logSystem('Bağlantı tamamen kesildi.', true);
                updateUIForDisconnected();
            });
        }

        async function startLocalMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                el.localVideo.srcObject = localStream;
                el.localVideoContainer.style.display = 'block';
                el.toggleAudioBtn.disabled = false;
                el.toggleVideoBtn.disabled = false;
                el.shareScreenBtn.disabled = false;
                if (connectedUsers.size > 0) el.startCallBtn.disabled = false;
                logSystem("Kamera ve mikrofon erişimi sağlandı.");
            } catch (error) {
                logSystem(`Medya cihazlarına erişilemedi: ${error.message}`, true);
            }
        }

        function setupSignalRHandlers() {
            if (!connection) return;

            connection.on("UserJoined", (userName, userType, connectionId) => {
                connectedUsers.set(connectionId, { userName, userType });
                addChatMessage("SİSTEM", `${userName} (${userType}) odaya katıldı.`, true);
                logSystem(`Kullanıcı katıldı: ${userName}`);
                playNotificationSound();
                updateParticipantList();
                if (localStream) el.startCallBtn.disabled = false;
            });

            connection.on("UserLeft", (userName, connectionId) => {
                if (connectedUsers.has(connectionId)) {
                    connectedUsers.delete(connectionId);
                    addChatMessage("SİSTEM", `${userName} odadan ayrıldı.`, true);
                    logSystem(`Kullanıcı ayrıldı: ${userName}`);
                    updateParticipantList();
                    if (connectedUsers.size === 0) {
                        el.startCallBtn.disabled = true;
                        if (peerConnection) endCall();
                    }
                }
            });

            connection.on("UserDisconnected", connectionId => {
                if (connectedUsers.has(connectionId)) {
                    const user = connectedUsers.get(connectionId);
                    connectedUsers.delete(connectionId);
                    addChatMessage("SİSTEM", `${user.userName} bağlantısı koptu.`, true);
                    logSystem(`Bağlantı koptu: ${user.userName}`);
                    updateParticipantList();
                    if (connectedUsers.size === 0) {
                        el.startCallBtn.disabled = true;
                        if (peerConnection) endCall();
                    }
                }
            });

            connection.on("ReceiveMessage", (userName, message, timestamp) => {
                const isSystem = userName === "SİSTEM";
                addChatMessage(userName, message, isSystem, timestamp);
                if (userName !== currentUserName && !isSystem) playNotificationSound();
            });

            connection.on("ReceiveOffer", async (offer, fromConnectionId) => {
                logSystem(`Arama teklifi alındı.`);
                await handleWebRTCOffer(offer, fromConnectionId);
            });

            connection.on("ReceiveAnswer", async (answer, fromConnectionId) => {
                logSystem(`Arama yanıtı alındı.`);
                await handleWebRTCAnswer(answer, fromConnectionId);
            });

            connection.on("ReceiveIceCandidate", async (candidate, fromConnectionId) => {
                await handleIceCandidate(candidate, fromConnectionId);
            });

            connection.on("ReceiveVideoFrame", (frameData, fromConnectionId) => {
                el.remoteImage.src = "data:image/jpeg;base64," + frameData;
                el.remoteImage.style.display = "block";
                el.remoteVideo.style.display = "none";
                el.emptyVideoState.style.display = "none";
                const user = connectedUsers.get(fromConnectionId);
                if (user) {
                    el.remoteParticipantName.style.display = 'flex';
                    el.remoteNameText.textContent = user.userName + " (Windows)";
                }
            });

            connection.on("VideoCallStopped", (connectionId) => {
                logSystem("Karşı taraf video aramasını durdurdu.");
                el.remoteImage.style.display = "none";
                el.remoteParticipantName.style.display = 'none';
                el.emptyVideoState.style.display = "flex";
            });
        }

        // ─── WebRTC Signaling ─────────────────────────────────────
        async function handleWebRTCOffer(offerJson, fromConnectionId) {
            try {
                const offer = JSON.parse(offerJson);
                createPeerConnection(fromConnectionId);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await connection.invoke("SendAnswer", currentRoomId, fromConnectionId, JSON.stringify(answer));
                updateUIForCallActive(fromConnectionId);
            } catch (error) {
                logSystem(`Teklif işleme hatası: ${error.message}`, true);
            }
        }

        async function handleWebRTCAnswer(answerJson, fromConnectionId) {
            try {
                const answer = JSON.parse(answerJson);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                updateUIForCallActive(fromConnectionId);
            } catch (error) {
                logSystem(`Yanıt işleme hatası: ${error.message}`, true);
            }
        }

        async function handleIceCandidate(candidateJson, fromConnectionId) {
            try {
                const candidate = JSON.parse(candidateJson);
                if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch { }
        }

        function createPeerConnection(targetConnectionId) {
            if (peerConnection) return;
            peerConnection = new RTCPeerConnection(rtcConfiguration);

            peerConnection.onicecandidate = async event => {
                if (event.candidate) {
                    const candidateJson = JSON.stringify(event.candidate);
                    for (let [connId] of connectedUsers) {
                        if (connId !== connection.connectionId) {
                            await connection.invoke("SendIceCandidate", currentRoomId, connId, candidateJson);
                        }
                    }
                }
            };

            peerConnection.ontrack = event => {
                if (!remoteStream) {
                    remoteStream = new MediaStream();
                    el.remoteVideo.srcObject = remoteStream;
                }
                
                // Add tracks regardless of whether they arrived inside a MediaStream or as discrete tracks 
                if (event.streams && event.streams.length > 0) {
                    event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                } else {
                    remoteStream.addTrack(event.track);
                }

                el.remoteVideo.style.display = "block";
                el.remoteImage.style.display = "none";
                el.emptyVideoState.style.display = "none";
            };

            peerConnection.onconnectionstatechange = () => {
                logSystem(`WebRTC durumu: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
                    logSystem('WebRTC bağlantısı koptu.', true);
                }
            };

            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
        }

        async function startCall() {
            if (!localStream) { alert("Kamera/Mikrofon erişimi yok!"); return; }
            if (connectedUsers.size === 0) { alert("Odada başka kullanıcı yok."); return; }
            try {
                createPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                for (let [connId] of connectedUsers) {
                    if (connId !== connection.connectionId) {
                        await connection.invoke("SendOffer", currentRoomId, connId, JSON.stringify(offer));
                    }
                }
                logSystem("Arama başlatılıyor...");
            } catch (error) {
                logSystem(`Arama hatası: ${error.message}`, true);
            }
        }

        function endCall() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (remoteStream) { remoteStream.getTracks().forEach(t => t.stop()); remoteStream = null; }
            el.remoteVideo.srcObject = null;
            el.remoteVideo.style.display = "none";
            el.remoteImage.style.display = "none";
            el.remoteParticipantName.style.display = "none";
            el.emptyVideoState.style.display = "flex";
            el.startCallBtn.style.display = 'flex';
            el.endCallBtn.style.display = 'none';
            if (connectedUsers.size > 0 && localStream) el.startCallBtn.disabled = false;
            logSystem("Görüşme sonlandırıldı.");
        }

        // ─── Media Controls ──────────────────────────────────────
        function toggleAudio() {
            if (!localStream) return;
            isAudioMuted = !isAudioMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isAudioMuted);
            el.toggleAudioBtn.innerHTML = `<i data-lucide="${isAudioMuted ? 'mic-off' : 'mic'}" style="width:20px;height:20px;"></i>`;
            el.toggleAudioBtn.classList.toggle('active-danger', isAudioMuted);
            lucide.createIcons();
            logSystem(`Mikrofon ${isAudioMuted ? 'kapatıldı' : 'açıldı'}.`);
        }

        function toggleVideo() {
            if (!localStream) return;
            isVideoMuted = !isVideoMuted;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoMuted);
            el.toggleVideoBtn.innerHTML = `<i data-lucide="${isVideoMuted ? 'camera-off' : 'camera'}" style="width:20px;height:20px;"></i>`;
            el.toggleVideoBtn.classList.toggle('active-danger', isVideoMuted);
            lucide.createIcons();
            logSystem(`Kamera ${isVideoMuted ? 'kapatıldı' : 'açıldı'}.`);
        }

        async function toggleScreenShare() {
            if (isScreenSharing) {
                try {
                    const videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const videoTrack = videoStream.getVideoTracks()[0];
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }
                    const oldTrack = localStream.getVideoTracks()[0];
                    localStream.removeTrack(oldTrack);
                    oldTrack.stop();
                    localStream.addTrack(videoTrack);
                    el.localVideo.srcObject = localStream;
                    isScreenSharing = false;
                    el.shareScreenBtn.classList.remove('active-primary');
                    logSystem("Ekran paylaşımı durduruldu.");
                } catch (err) {
                    logSystem("Kameraya geri dönülemedi: " + err.message, true);
                }
            } else {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    screenTrack.onended = () => toggleScreenShare();
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(screenTrack);
                    }
                    const oldTrack = localStream.getVideoTracks()[0];
                    localStream.removeTrack(oldTrack);
                    oldTrack.stop();
                    localStream.addTrack(screenTrack);
                    el.localVideo.srcObject = localStream;
                    isScreenSharing = true;
                    el.shareScreenBtn.classList.add('active-primary');
                    logSystem("Ekran paylaşımı başlatıldı.");
                } catch (err) {
                    logSystem("Ekran paylaşımı iptal edildi.", true);
                }
            }
        }

        // ─── Chat ─────────────────────────────────────────────────
        async function sendMessage() {
            const message = el.messageInput.value.trim();
            if (!message) return;
            if (!connection || connection.state !== 'Connected') { alert('Bağlı değilsiniz!'); return; }
            const timestamp = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            try {
                await connection.invoke("SendMessage", currentRoomId, currentUserName, message, timestamp);
                el.messageInput.value = '';
            } catch (error) {
                logSystem(`Mesaj gönderilemedi: ${error.message}`, true);
            }
        }

        function addChatMessage(sender, message, isSystem = false, timestamp = null) {
            const container = el.chatMessages;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';

            if (isSystem) {
                msgDiv.classList.add('system');
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = message;  // XSS-safe
                msgDiv.appendChild(bubble);
            } else {
                const timeStr = timestamp || new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                const isSelf = sender === currentUserName;
                msgDiv.classList.add(isSelf ? 'self' : 'other');

                const meta = document.createElement('div');
                meta.className = 'msg-meta';
                if (!isSelf) {
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = sender;
                    meta.appendChild(nameSpan);
                }
                const timeSpan = document.createElement('span');
                timeSpan.textContent = timeStr;
                meta.appendChild(timeSpan);

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = message;  // XSS-safe

                msgDiv.appendChild(meta);
                msgDiv.appendChild(bubble);
            }

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function logSystem(msg, isError = false) {
            const container = el.systemLogs;
            const time = new Date().toLocaleTimeString('tr-TR');
            const logItem = document.createElement('div');
            logItem.className = 'log-item' + (isError ? ' error' : '');
            logItem.textContent = `[${time}] ${msg}`;
            container.appendChild(logItem);
            container.scrollTop = container.scrollHeight;
        }

        // ─── Connection Cleanup ───────────────────────────────────
        async function disconnectFromServer() {
            try {
                if (connection && connection.state === "Connected") {
                    await connection.invoke("LeaveRoom", currentRoomId, currentUserName);
                    await connection.stop();
                }
                connection = null;
                connectedUsers.clear();
                endCall();
                if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
                el.localVideo.srcObject = null;
                el.localVideoContainer.style.display = 'none';
                updateUIForDisconnected();
                logSystem("Sunucu bağlantısı kesildi.");
                addChatMessage("SİSTEM", "Odadan ayrıldınız.", true);
            } catch (error) {
                logSystem(`Bağlantı kesme hatası: ${error.message}`, true);
            }
        }

        // ─── UI State Management ──────────────────────────────────
        function updateUIForConnected() {
            el.connectBtn.style.display = 'none';
            el.disconnectBtn.style.display = 'flex';
            el.roomId.disabled = true;
            el.userName.disabled = true;
            el.status.textContent = 'Bağlı';
            el.status.className = 'status-badge connected';
            el.messageInput.disabled = false;
            el.sendMessageBtn.disabled = false;
            updateParticipantList();
        }

        function updateUIForDisconnected() {
            el.connectBtn.style.display = 'flex';
            el.disconnectBtn.style.display = 'none';
            el.roomId.disabled = false;
            el.userName.disabled = false;
            el.status.textContent = 'Bağlı Değil';
            el.status.className = 'status-badge disconnected';
            el.startCallBtn.disabled = true;
            el.startCallBtn.style.display = 'flex';
            el.endCallBtn.style.display = 'none';
            el.messageInput.disabled = true;
            el.sendMessageBtn.disabled = true;
            el.toggleAudioBtn.disabled = true;
            el.toggleVideoBtn.disabled = true;
            el.shareScreenBtn.disabled = true;
            el.emptyVideoState.style.display = 'flex';
            el.remoteVideo.style.display = 'none';

            isAudioMuted = false;
            isVideoMuted = false;
            el.toggleAudioBtn.innerHTML = '<i data-lucide="mic" style="width:20px;height:20px;"></i>';
            el.toggleVideoBtn.innerHTML = '<i data-lucide="camera" style="width:20px;height:20px;"></i>';
            el.toggleAudioBtn.classList.remove('active-danger');
            el.toggleVideoBtn.classList.remove('active-danger');
            el.shareScreenBtn.classList.remove('active-primary');
            lucide.createIcons();

            el.chatMessages.innerHTML = '<div class="message system"><div class="msg-bubble">Odaya katılarak sohbete başlayın.</div></div>';
            connectedUsers.clear();
            updateParticipantList();
        }

        function updateUIForCallActive(fromConnectionId) {
            el.startCallBtn.style.display = 'none';
            el.endCallBtn.style.display = 'flex';
            el.emptyVideoState.style.display = 'none';
            const user = connectedUsers.get(fromConnectionId);
            if (user) {
                el.remoteParticipantName.style.display = 'flex';
                el.remoteNameText.textContent = user.userName;
            }
        }
    </script>
</body>
</html>
