<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRTC Pro &ndash; İletişim Platformu</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Koyu Tema Renkleri */
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --radius-md: 12px;
            --radius-lg: 16px;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Glassmorphism Header */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background: var(--surface-color);
        }

        /* Connection Panel */
        .connection-panel {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--surface-color);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .input-group i {
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            width: 120px;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        .divider {
            width: 1px;
            height: 20px;
            background: var(--border-color);
        }

        button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: var(--danger-hover);
            transform: translateY(-1px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-badge.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }
        .status-badge.disconnected::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger-color);
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }
        .status-badge.connected::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            box-shadow: 0 0 8px var(--success-color);
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            padding: 24px;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 73px);
            overflow: hidden;
        }

        /* Video Area */
        .video-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .main-video-container {
            flex: 1;
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, .remote-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .participant-name {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Local Video Overlay */
        .local-video-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            aspect-ratio: 16/9;
            background: var(--surface-color);
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .local-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Ayna efekti */
        }

        /* Floating Controls */
        .floating-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 20;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s;
        }

        [data-theme="light"] .control-btn {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }

        .control-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        [data-theme="light"] .control-btn:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.1);
        }

        .control-btn.active-danger {
            background: var(--danger-color);
            color: white;
        }

        .control-btn.active-primary {
            background: var(--primary-color);
            color: white;
        }

        /* Sidebar: Chat & Logs */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .panel {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-panel {
            flex: 2;
        }

        .log-panel {
            flex: 1;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        .panel-content::-webkit-scrollbar {
            width: 6px;
        }
        .panel-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        /* Chat messages */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.system {
            align-self: center;
            align-items: center;
            max-width: 100%;
        }

        .message.system .msg-bubble {
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 4px 0;
        }

        .message.self {
            align-self: flex-end;
        }

        .message.other {
            align-self: flex-start;
        }

        .msg-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }

        .message.self .msg-meta {
            justify-content: flex-end;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.other .msg-bubble {
            background: var(--border-color);
            border-top-left-radius: 4px;
        }

        .message.self .msg-bubble {
            background: var(--primary-color);
            color: white;
            border-top-right-radius: 4px;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Log items */
        .log-item {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .workspace {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .sidebar {
                width: 100%;
                height: 500px;
            }
            .main-video-container {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            .connection-panel {
                flex-direction: column;
                width: 100%;
                border-radius: 12px;
            }
            .divider {
                width: 100%;
                height: 1px;
            }
            input {
                width: 100%;
            }
            .local-video-container {
                width: 120px;
            }
            .floating-controls {
                width: 90%;
                justify-content: space-around;
                padding: 10px;
            }
        }
        
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <i data-lucide="video"></i>
            WebRTC Pro
        </div>
        
        <div class="connection-panel">
            <div class="input-group">
                <i data-lucide="hash"></i>
                <input type="text" id="roomId" value="room1" placeholder="Oda ID" />
            </div>
            <div class="divider"></div>
            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="userName" value="WebUser" placeholder="Kullanıcı Adı" />
            </div>
            <button id="connectBtn" class="btn-primary">
                Bağlan
            </button>
            <button id="disconnectBtn" class="btn-danger" style="display: none;">
                Ayrıl
            </button>
            <div class="divider hidden-mobile"></div>
            <div class="status-badge disconnected" id="status">Bağlı Değil</div>
        </div>

        <div class="header-controls">
            <button class="theme-toggle" id="themeToggle" title="Temayı Değiştir">
                <i data-lucide="moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <div class="workspace">
        <div class="video-grid">
            <div class="main-video-container">
                <div class="video-wrapper">
                    <!-- Remote Video -->
                    <video id="remoteVideo" autoplay playsinline></video>
                    <!-- For Windows Client Base64 Fallback -->
                    <img id="remoteImage" class="remote-img" style="display: none;" alt="Uzak Kare" />
                    
                    <div class="participant-name" id="remoteParticipantName" style="display: none;">
                        <i data-lucide="user" size="16"></i> <span id="remoteNameText">Uzak Kullanıcı</span>
                    </div>
                </div>

                <!-- Local Video PIP -->
                <div class="local-video-container" id="localVideoContainer" style="display: none;">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="participant-name" style="bottom: 8px; left: 8px; font-size: 0.75rem; padding: 4px 8px;">
                        Sen
                    </div>
                </div>

                <!-- Meeting Controls -->
                <div class="floating-controls">
                    <button class="control-btn" id="toggleAudioBtn" title="Mikrofon (Sustur/Aç)" disabled>
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="control-btn" id="toggleVideoBtn" title="Kamera (Kapat/Aç)" disabled>
                        <i data-lucide="camera"></i>
                    </button>
                    <button class="control-btn" id="shareScreenBtn" title="Ekran Paylaş" disabled>
                        <i data-lucide="monitor-up"></i>
                    </button>
                    <button class="control-btn active-danger" id="endCallBtn" title="Görüşmeyi Bitir" style="display: none;">
                        <i data-lucide="phone-off"></i>
                    </button>
                    <button class="control-btn active-primary" id="startCallBtn" title="Görüşme Başlat" disabled>
                        <i data-lucide="phone"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel chat-panel">
                <div class="panel-header">
                    <i data-lucide="message-square"></i> Sohbet
                </div>
                <div class="panel-content" id="chatMessages">
                    <div class="message system">
                        <div class="msg-bubble">Odaya katılarak sohbete başlayın.</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="messageInput" placeholder="Mesaj yazın..." disabled />
                    <button class="btn-primary send-btn" id="sendMessageBtn" disabled>
                        <i data-lucide="send" size="18"></i>
                    </button>
                </div>
            </div>

            <div class="panel log-panel">
                <div class="panel-header">
                    <i data-lucide="terminal"></i> Sistem Kayıtları
                </div>
                <div class="panel-content" id="systemLogs">
                    <!-- Logs go here -->
                </div>
            </div>
        </div>
    </div>

    <!-- SignalR Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;
        
        themeToggle.addEventListener('click', () => {
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        });

        // WebRTC & SignalR Variables
        let connection = null;
        let localStream = null;
        let remoteStream = null;
        let peerConnection = null;
        let currentRoomId = '';
        let currentUserName = '';
        let connectedUsers = new Map();
        
        let isAudioMuted = false;
        let isVideoMuted = false;
        let isScreenSharing = false;

        const rtcConfiguration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // DOM Elements
        const elements = {
            roomId: document.getElementById('roomId'),
            userName: document.getElementById('userName'),
            connectBtn: document.getElementById('connectBtn'),
            disconnectBtn: document.getElementById('disconnectBtn'),
            status: document.getElementById('status'),
            
            localVideo: document.getElementById('localVideo'),
            localVideoContainer: document.getElementById('localVideoContainer'),
            remoteVideo: document.getElementById('remoteVideo'),
            remoteImage: document.getElementById('remoteImage'),
            remoteParticipantName: document.getElementById('remoteParticipantName'),
            remoteNameText: document.getElementById('remoteNameText'),
            
            toggleAudioBtn: document.getElementById('toggleAudioBtn'),
            toggleVideoBtn: document.getElementById('toggleVideoBtn'),
            shareScreenBtn: document.getElementById('shareScreenBtn'),
            startCallBtn: document.getElementById('startCallBtn'),
            endCallBtn: document.getElementById('endCallBtn'),
            
            chatMessages: document.getElementById('chatMessages'),
            messageInput: document.getElementById('messageInput'),
            sendMessageBtn: document.getElementById('sendMessageBtn'),
            systemLogs: document.getElementById('systemLogs')
        };

        // Event Listeners setup
        elements.connectBtn.addEventListener('click', connectToServer);
        elements.disconnectBtn.addEventListener('click', disconnectFromServer);
        elements.startCallBtn.addEventListener('click', startCall);
        elements.endCallBtn.addEventListener('click', endCall);
        elements.sendMessageBtn.addEventListener('click', sendMessage);
        elements.messageInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        elements.toggleAudioBtn.addEventListener('click', toggleAudio);
        elements.toggleVideoBtn.addEventListener('click', toggleVideo);
        elements.shareScreenBtn.addEventListener('click', toggleScreenShare);

        // Core Functions
        async function connectToServer() {
            if (!elements.roomId.value.trim() || !elements.userName.value.trim()) {
                alert('Lütfen Oda ID ve Kullanıcı Adı alanlarını doldurun!');
                return;
            }

            try {
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("http://localhost:5000/webrtchub")
                    .withAutomaticReconnect()
                    .configureLogging(signalR.LogLevel.Information)
                    .build();

                setupSignalRHandlers();
                await connection.start();

                currentRoomId = elements.roomId.value.trim();
                currentUserName = elements.userName.value.trim();

                await connection.invoke("JoinRoom", currentRoomId, currentUserName, "WebClient");

                updateUIForConnected();
                logSystem(`Bağlantı başarılı. Oda: ${currentRoomId}`);
                
                // Kamerayı otomatik başlat
                await startLocalMedia();
            } catch (error) {
                logSystem(`Bağlantı hatası: ${error.message}`, true);
                alert(`Bağlantı başarısız: ${error.message}`);
            }
        }

        async function startLocalMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                elements.localVideo.srcObject = localStream;
                elements.localVideoContainer.style.display = 'block';
                
                // Enable controls
                elements.toggleAudioBtn.disabled = false;
                elements.toggleVideoBtn.disabled = false;
                elements.shareScreenBtn.disabled = false;
                
                if (connectedUsers.size > 0) {
                    elements.startCallBtn.disabled = false;
                }
                
                logSystem("Kamera ve mikrofon erişimi sağlandı.");
            } catch (error) {
                logSystem(`Medya cihazlarına erişilemedi: ${error.message}`, true);
            }
        }

        function setupSignalRHandlers() {
            if (!connection) return;

            connection.on("UserJoined", (userName, userType, connectionId) => {
                connectedUsers.set(connectionId, { userName, userType });
                addChatMessage("SİSTEM", `${userName} (${userType}) odaya katıldı.`, true);
                logSystem(`Kullanıcı katıldı: ${userName}`);
                if (localStream) {
                    elements.startCallBtn.disabled = false;
                }
            });

            connection.on("UserLeft", (userName, connectionId) => {
                if (connectedUsers.has(connectionId)) {
                    connectedUsers.delete(connectionId);
                    logSystem(`Kullanıcı ayrıldı: ${userName}`);
                    if (connectedUsers.size === 0) {
                        elements.startCallBtn.disabled = true;
                        if (peerConnection) endCall(); // Karşı taraf çıktıysa aramayı bitir
                    }
                }
            });

            // Geriye dönük uyumluluk veya sunucudan gelen leave mesajları
            connection.on("UserDisconnected", connectionId => {
                if (connectedUsers.has(connectionId)) {
                    const user = connectedUsers.get(connectionId);
                    connectedUsers.delete(connectionId);
                    addChatMessage("SİSTEM", `${user.userName} bağlantısı koptu.`, true);
                    logSystem(`Bağlantı koptu: ${user.userName}`);
                    if (connectedUsers.size === 0) {
                        elements.startCallBtn.disabled = true;
                        if (peerConnection) endCall();
                    }
                }
            });

            connection.on("ReceiveMessage", (userName, message, timestamp) => {
                const isSystem = userName === "SİSTEM";
                addChatMessage(userName, message, isSystem, timestamp);
            });

            connection.on("ReceiveOffer", async (offer, fromConnectionId) => {
                logSystem(`Arama teklifi alındı.`);
                await handleWebRTCOffer(offer, fromConnectionId);
            });

            connection.on("ReceiveAnswer", async (answer, fromConnectionId) => {
                logSystem(`Arama yanıtı alındı.`);
                await handleWebRTCAnswer(answer, fromConnectionId);
            });

            connection.on("ReceiveIceCandidate", async (candidate, fromConnectionId) => {
                await handleIceCandidate(candidate, fromConnectionId);
            });

            // ASP.NET / Windows istemcisinden gelen Base64 kare desteği
            connection.on("ReceiveVideoFrame", (frameData, fromConnectionId) => {
                elements.remoteImage.src = "data:image/jpeg;base64," + frameData;
                elements.remoteImage.style.display = "block";
                elements.remoteVideo.style.display = "none";
                
                const user = connectedUsers.get(fromConnectionId);
                if (user) {
                    elements.remoteParticipantName.style.display = 'flex';
                    elements.remoteNameText.textContent = user.userName + " (Windows)";
                }
            });
            
            connection.on("VideoCallStopped", (connectionId) => {
                logSystem("Karşı taraf video aramasını durdurdu.");
                // Eğer Base64 görüntüsü geliyorsa onu temizle
                elements.remoteImage.style.display = "none";
                elements.remoteParticipantName.style.display = 'none';
            });
        }

        async function handleWebRTCOffer(offerJson, fromConnectionId) {
            try {
                const offer = JSON.parse(offerJson);
                createPeerConnection(fromConnectionId);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await connection.invoke("SendAnswer", currentRoomId, fromConnectionId, JSON.stringify(answer));
                
                updateUIForCallActive(fromConnectionId);
            } catch (error) {
                logSystem(`Teklif işleme hatası: ${error.message}`, true);
            }
        }

        async function handleWebRTCAnswer(answerJson, fromConnectionId) {
            try {
                const answer = JSON.parse(answerJson);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                updateUIForCallActive(fromConnectionId);
            } catch (error) {
                logSystem(`Yanıt işleme hatası: ${error.message}`, true);
            }
        }

        async function handleIceCandidate(candidateJson, fromConnectionId) {
            try {
                const candidate = JSON.parse(candidateJson);
                if (peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            } catch (error) {
                // Ignore empty candidates
            }
        }

        function createPeerConnection(targetConnectionId) {
            if (peerConnection) return;
            peerConnection = new RTCPeerConnection(rtcConfiguration);

            peerConnection.onicecandidate = async event => {
                if (event.candidate) {
                    const candidateJson = JSON.stringify(event.candidate);
                    // Belirli bir hedefe veya odadaki herkese gönderilebilir, mevcut sunucu mimarisi gereği herkese:
                    for (let [connId] of connectedUsers) {
                        if (connId !== connection.connectionId) {
                            await connection.invoke("SendIceCandidate", currentRoomId, connId, candidateJson);
                        }
                    }
                }
            };

            peerConnection.ontrack = event => {
                if (!remoteStream) {
                    remoteStream = new MediaStream();
                    elements.remoteVideo.srcObject = remoteStream;
                }
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });

                elements.remoteVideo.style.display = "block";
                elements.remoteImage.style.display = "none";
            };

            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
        }

        async function startCall() {
            if (!localStream) {
                alert("Kamera/Mikrofon erişimi yok!");
                return;
            }
            if (connectedUsers.size === 0) {
                alert("Odada başka kullanıcı yok.");
                return;
            }

            try {
                createPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                for (let [connId] of connectedUsers) {
                    if (connId !== connection.connectionId) {
                        await connection.invoke("SendOffer", currentRoomId, connId, JSON.stringify(offer));
                    }
                }

                logSystem("Arama başlatılıyor...");
            } catch (error) {
                logSystem(`Arama hatası: ${error.message}`, true);
            }
        }

        function endCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (remoteStream) {
                remoteStream.getTracks().forEach(t => t.stop());
                remoteStream = null;
            }
            elements.remoteVideo.srcObject = null;
            elements.remoteVideo.style.display = "block"; // Keep black block
            elements.remoteImage.style.display = "none";
            elements.remoteParticipantName.style.display = "none";
            
            elements.startCallBtn.style.display = 'flex';
            elements.endCallBtn.style.display = 'none';
            
            if (connectedUsers.size > 0 && localStream) {
                elements.startCallBtn.disabled = false;
            }
            
            logSystem("Görüşme sonlandırıldı.");
        }

        // --- Medya Kontrolleri ---
        function toggleAudio() {
            if (!localStream) return;
            isAudioMuted = !isAudioMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isAudioMuted;
            });
            
            elements.toggleAudioBtn.innerHTML = isAudioMuted ? '<i data-lucide="mic-off"></i>' : '<i data-lucide="mic"></i>';
            elements.toggleAudioBtn.classList.toggle('active-danger', isAudioMuted);
            lucide.createIcons();
            logSystem(`Mikrofon ${isAudioMuted ? 'kapatıldı' : 'açıldı'}.`);
        }

        function toggleVideo() {
            if (!localStream) return;
            isVideoMuted = !isVideoMuted;
            localStream.getVideoTracks().forEach(track => {
                track.enabled = !isVideoMuted;
            });
            
            elements.toggleVideoBtn.innerHTML = isVideoMuted ? '<i data-lucide="camera-off"></i>' : '<i data-lucide="camera"></i>';
            elements.toggleVideoBtn.classList.toggle('active-danger', isVideoMuted);
            lucide.createIcons();
            logSystem(`Kamera ${isVideoMuted ? 'kapatıldı' : 'açıldı'}.`);
        }

        async function toggleScreenShare() {
            if (isScreenSharing) {
                // Ekran paylaşımını durdur, kameraya geri dön
                try {
                    const videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const videoTrack = videoStream.getVideoTracks()[0];
                    
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }
                    
                    // Local stream'i güncelle
                    const oldTrack = localStream.getVideoTracks()[0];
                    localStream.removeTrack(oldTrack);
                    oldTrack.stop();
                    
                    localStream.addTrack(videoTrack);
                    elements.localVideo.srcObject = localStream;
                    
                    isScreenSharing = false;
                    elements.shareScreenBtn.classList.remove('active-primary');
                    logSystem("Ekran paylaşımı durduruldu.");
                } catch (err) {
                    logSystem("Kameraya geri dönülemedi: " + err.message, true);
                }
            } else {
                // Ekran paylaşımını başlat
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    
                    // Paylaşım tarayıcı arayüzünden durdurulursa
                    screenTrack.onended = () => {
                        toggleScreenShare(); // Yarıda kesilirse kameraya dön
                    };

                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                        if (sender) sender.replaceTrack(screenTrack);
                    }

                    // Local stream'i geçici olarak ekran paylaşımı ile değiştir
                    const oldTrack = localStream.getVideoTracks()[0];
                    localStream.removeTrack(oldTrack);
                    oldTrack.stop();

                    localStream.addTrack(screenTrack);
                    elements.localVideo.srcObject = localStream;

                    isScreenSharing = true;
                    elements.shareScreenBtn.classList.add('active-primary');
                    logSystem("Ekran paylaşımı başlatıldı.");
                } catch (err) {
                    logSystem("Ekran paylaşımı iptal edildi veya hata oluştu.", true);
                }
            }
        }

        // --- Chat ve Mesajlaşma ---
        async function sendMessage() {
            const message = elements.messageInput.value.trim();
            if (!message) return;
            if (!connection || connection.state !== 'Connected') {
                alert('Bağlı değilsiniz!');
                return;
            }
            
            const timestamp = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            
            try {
                await connection.invoke("SendMessage", currentRoomId, currentUserName, message, timestamp);
                // Mesajı sunucu herkese gönderiyor, kendimize Local olarak eklemiyoruz
                // Eğer sunucu gönderene de gönderiyorsa, "ReceiveMessage" tetiklenecektir.
                elements.messageInput.value = '';
            } catch (error) {
                logSystem(`Mesaj gönderilemedi: ${error.message}`, true);
            }
        }

        function addChatMessage(sender, message, isSystem = false, timestamp = null) {
            const container = elements.chatMessages;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            if (isSystem) {
                msgDiv.classList.add('system');
                msgDiv.innerHTML = `<div class="msg-bubble">${message}</div>`;
            } else {
                const timeStr = timestamp || new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                const isSelf = sender === currentUserName;
                msgDiv.classList.add(isSelf ? 'self' : 'other');
                
                msgDiv.innerHTML = `
                    <div class="msg-meta">
                        ${!isSelf ? `<span>${sender}</span>` : ''} 
                        <span>${timeStr}</span>
                    </div>
                    <div class="msg-bubble">${message}</div>
                `;
            }
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function logSystem(msg, isError = false) {
            const container = elements.systemLogs;
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            if (isError) logItem.style.color = 'var(--danger-color)';
            logItem.textContent = `[${time}] ${msg}`;
            container.appendChild(logItem);
            container.scrollTop = container.scrollHeight;
        }

        // --- Connection Cleanup ---
        async function disconnectFromServer() {
            try {
                if (connection && connection.state === "Connected") {
                    await connection.invoke("LeaveRoom", currentRoomId, currentUserName);
                    await connection.stop();
                }
                connection = null;
                connectedUsers.clear();

                endCall();
                
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
                elements.localVideo.srcObject = null;
                elements.localVideoContainer.style.display = 'none';

                updateUIForDisconnected();
                logSystem("Sunucu bağlantısı kesildi.");
                addChatMessage("SİSTEM", "Odadan ayrıldınız.", true);
            } catch (error) {
                logSystem(`Bağlantı kesme hatası: ${error.message}`, true);
            }
        }

        function updateUIForConnected() {
            elements.connectBtn.style.display = 'none';
            elements.disconnectBtn.style.display = 'flex';
            elements.roomId.disabled = true;
            elements.userName.disabled = true;
            
            elements.status.textContent = 'Bağlı';
            elements.status.classList.replace('disconnected', 'connected');
            
            elements.messageInput.disabled = false;
            elements.sendMessageBtn.disabled = false;
        }

        function updateUIForDisconnected() {
            elements.connectBtn.style.display = 'flex';
            elements.disconnectBtn.style.display = 'none';
            elements.roomId.disabled = false;
            elements.userName.disabled = false;
            
            elements.status.textContent = 'Bağlı Değil';
            elements.status.classList.replace('connected', 'disconnected');
            
            elements.startCallBtn.disabled = true;
            elements.startCallBtn.style.display = 'flex';
            elements.endCallBtn.style.display = 'none';
            
            elements.messageInput.disabled = true;
            elements.sendMessageBtn.disabled = true;
            
            elements.toggleAudioBtn.disabled = true;
            elements.toggleVideoBtn.disabled = true;
            elements.shareScreenBtn.disabled = true;
            
            // Eğer mute'lendi ise UI'ı resetle
            isAudioMuted = false;
            isVideoMuted = false;
            elements.toggleAudioBtn.innerHTML = '<i data-lucide="mic"></i>';
            elements.toggleVideoBtn.innerHTML = '<i data-lucide="camera"></i>';
            elements.toggleAudioBtn.classList.remove('active-danger');
            elements.toggleVideoBtn.classList.remove('active-danger');
            lucide.createIcons();
            
            elements.chatMessages.innerHTML = '<div class="message system"><div class="msg-bubble">Odaya katılarak sohbete başlayın.</div></div>';
        }
        
        function updateUIForCallActive(fromConnectionId) {
            elements.startCallBtn.style.display = 'none';
            elements.endCallBtn.style.display = 'flex';
            
            // Remote participant ismini güncelle
            const user = connectedUsers.get(fromConnectionId);
            if (user) {
                elements.remoteParticipantName.style.display = 'flex';
                elements.remoteNameText.textContent = user.userName;
            }
        }
    </script>
</body>
